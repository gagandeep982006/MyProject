<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media.css">
</head>
<body>
    <div class="login-section">
        <div class="main">
             <form class="login-from">
                <div class="icon">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="Email" required>
                </div >
                <div class="icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Username" minlength="4" required>
                </div >
                <div class="icon">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" placeholder="Phone Number" minlength="10" pattern="[0-9]{10}" required>
                </div >
                <div class="icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password"  placeholder="Password" minlength="9" required>
                </div>
                <div>
                    <button type="submit" style="display: block;"><a href="log_in.html">Sign up</a></button>
                </div>
            </form>
        </div>

        <div class="footer">
            <p style="display: inline-block;">Log in?</p>
            <a href="log_in.html">login</a>
        </div>
    </div>
    
</body>
</html>
